name: Database Migration & Knowledge Graph

on:
  workflow_dispatch:
    inputs:
      run_sql_migration:
        description: 'Run SQL migration (add_taxonomy_columns.sql)'
        required: false
        default: 'false'
        type: boolean
      run_classify_companies:
        description: 'Run company classification script'
        required: false
        default: 'false'
        type: boolean
      run_graph_rebuild:
        description: 'Rebuild Neo4j knowledge graph'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Dry run (no actual changes)'
        required: false
        default: 'true'
        type: boolean

env:
  AWS_REGION: us-west-2

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary boto3

      - name: Run SQL Migration
        if: ${{ inputs.run_sql_migration == true }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "Running SQL migration: add_taxonomy_columns.sql"

          if [ "$DRY_RUN" == "true" ]; then
            echo "[DRY RUN] Would execute:"
            cat scripts/add_taxonomy_columns.sql
          else
            PGPASSWORD=$DB_PASSWORD psql \
              -h $DB_HOST \
              -p $DB_PORT \
              -U $DB_USER \
              -d $DB_NAME \
              -f scripts/add_taxonomy_columns.sql
            echo "SQL migration completed"
          fi

      - name: Run Company Classification
        if: ${{ inputs.run_classify_companies == true }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "Running company classification script"

          cd backend
          pip install -r requirements.txt || pip install psycopg2-binary boto3

          if [ "$DRY_RUN" == "true" ]; then
            python ../scripts/classify_companies.py --dry-run
          else
            python ../scripts/classify_companies.py
          fi

          echo "Company classification completed"

      - name: Rebuild Knowledge Graph via EC2
        if: ${{ inputs.run_graph_rebuild == true }}
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "Triggering knowledge graph rebuild on EC2"

          if [ "$DRY_RUN" == "true" ]; then
            echo "[DRY RUN] Would call API endpoints:"
            echo "  POST /api/admin/clear-graph"
            echo "  POST /api/admin/build-graph"
            echo "  POST /api/admin/infer-relationships"
          else
            # Get backend URL from EC2 instance
            BACKEND_URL="${{ secrets.BACKEND_URL }}"

            if [ -z "$BACKEND_URL" ]; then
              echo "BACKEND_URL secret not set, using EC2 instance"
              # Use SSM to run curl commands on EC2
              COMMAND_ID=$(aws ssm send-command \
                --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
                --document-name "AWS-RunShellScript" \
                --parameters "commands=[
                  'echo \"Checking API health...\"',
                  'curl -f http://localhost:5000/health || exit 1',
                  'echo \"Getting current graph stats...\"',
                  'curl -s http://localhost:5000/api/knowledge-graph/stats',
                  'echo \"Clearing existing graph...\"',
                  'curl -X POST http://localhost:5000/api/admin/clear-graph',
                  'echo \"Building knowledge graph (this may take 10-30 minutes)...\"',
                  'curl -X POST http://localhost:5000/api/admin/build-graph --max-time 1800',
                  'echo \"Inferring relationships...\"',
                  'curl -X POST http://localhost:5000/api/admin/infer-relationships',
                  'echo \"Getting final graph stats...\"',
                  'curl -s http://localhost:5000/api/knowledge-graph/stats',
                  'echo \"Knowledge graph rebuild complete!\"'
                ]" \
                --timeout-seconds 2400 \
                --query 'Command.CommandId' \
                --output text)

              echo "Command ID: $COMMAND_ID"

              # Wait for completion (with longer timeout for graph build)
              aws ssm wait command-executed \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

              # Get output
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardOutputContent' \
                --output text
            else
              # Direct API calls if backend URL is available
              echo "Using backend URL: $BACKEND_URL"
              curl -f "$BACKEND_URL/health"
              curl -X POST "$BACKEND_URL/api/admin/clear-graph"
              curl -X POST "$BACKEND_URL/api/admin/build-graph" --max-time 1800
              curl -X POST "$BACKEND_URL/api/admin/infer-relationships"
              curl -s "$BACKEND_URL/api/knowledge-graph/stats"
            fi
          fi

          echo "Knowledge graph operations completed"

      - name: Summary
        run: |
          echo "=== Migration Summary ==="
          echo "SQL Migration: ${{ inputs.run_sql_migration }}"
          echo "Company Classification: ${{ inputs.run_classify_companies }}"
          echo "Graph Rebuild: ${{ inputs.run_graph_rebuild }}"
          echo "Dry Run: ${{ inputs.dry_run }}"
          echo "========================="
