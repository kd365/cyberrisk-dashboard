name: Docker Compose Integration Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/docker-compose-test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-west-2

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary tools to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create test environment file
        run: |
          cat > .env << EOF
          AWS_REGION=${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=cyberrisk
          DB_USER=postgres
          DB_PASSWORD=testpassword
          NEO4J_URI=bolt://neo4j:7687
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=testpassword
          S3_BUCKET=${{ secrets.S3_BUCKET_NAME }}
          COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
          USE_LANGCHAIN=false
          EOF

      - name: Build Docker images
        run: |
          echo "Building Docker images with docker compose..."
          docker compose build --parallel
          echo "Build complete!"

      - name: Start services
        run: |
          echo "Starting services with docker compose..."
          docker compose up -d
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Check service status
        run: |
          echo "=== Docker Compose Services Status ==="
          docker compose ps
          echo ""
          echo "=== Container Logs ==="
          docker compose logs --tail=50

      - name: Test backend health
        run: |
          echo "Testing backend health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:5000/health 2>/dev/null; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            sleep 5
          done
          echo "Backend health check failed"
          docker compose logs backend
          exit 1

      - name: Test frontend accessibility
        run: |
          echo "Testing frontend..."
          for i in {1..5}; do
            if curl -f http://localhost:3000 2>/dev/null; then
              echo "Frontend is accessible!"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            sleep 5
          done
          echo "Frontend accessibility check failed"
          docker compose logs frontend
          exit 1

      - name: Test Neo4j connectivity
        run: |
          echo "Testing Neo4j..."
          for i in {1..10}; do
            if curl -f http://localhost:7474 2>/dev/null; then
              echo "Neo4j is accessible!"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            sleep 5
          done
          echo "Neo4j accessibility check failed"
          docker compose logs neo4j
          exit 1

      - name: Run integration tests
        run: |
          echo "=== Running Integration Tests ==="

          # Test API endpoints
          echo "Testing /api/companies endpoint..."
          curl -s http://localhost:5000/api/companies | head -c 500 || true

          echo ""
          echo "Testing /api/health endpoint..."
          curl -s http://localhost:5000/health

          echo ""
          echo "All integration tests passed!"

      - name: Cleanup
        if: always()
        run: |
          echo "Stopping and removing containers..."
          docker compose down -v
          echo "Cleanup complete!"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: |
            docker-compose.yml
          retention-days: 5
